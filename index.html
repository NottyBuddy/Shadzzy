<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Love Vault ❤️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --primary: #ff4d6d; --secondary: #ff99ac; }
        
        html, body { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #000;
            color: #ffffff;
        }

        .master-bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: url("Mine.jpg") !important;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            filter: blur(12px) 
            z-index: -10; 
            transform: scale(1.1);
        }

        /* ZOOM OVERLAY STYLE (Insta-like) */
        #zoomOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center;
            z-index: 2000; cursor: pointer;
        }
        #zoomOverlay img {
            max-width: 90%; max-height: 80%;
            border: 3px solid white; border-radius: 10px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            animation: zoomIn 0.3s ease-out;
        }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        h1, h2, p, div { color: #ffffff !important; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }

        #hearts-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .heart-fall { position: absolute; color: rgba(255, 255, 255, 0.5); font-size: 15px; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; } 20% { opacity: 0.8; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

        #fireworks { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        .page { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; transition: opacity 0.5s; z-index: 10; 
            background: transparent !important; 
        }
        .hidden { opacity: 0 !important; pointer-events: none !important; }

        .glass { 
            background: rgba(255, 255, 255, 0.1); 
            padding: 25px; border-radius: 25px; 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2); 
            width: 85%; max-width: 380px; 
            max-height: 80vh; overflow-y: auto; scrollbar-width: none;
        }
        .glass::-webkit-scrollbar { display: none; }

        .btn { padding: 14px 30px; border: none; border-radius: 35px; cursor: pointer; margin: 10px; font-weight: bold; background: linear-gradient(45deg, var(--primary), var(--secondary)); color: #ffffff; box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4); font-size: 16px; }
        
        #anniversaryBtn { display: none; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4); } 50% { box-shadow: 0 0 25px rgba(255, 77, 109, 0.8); } 100% { box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4); } }

        #galleryPage { justify-content: flex-start; padding-top: 20px; }
        .gallery-container { width: 95%; height: 75vh; overflow-y: auto; scrollbar-width: none; }
        .gallery-container::-webkit-scrollbar { display: none; }
        .gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }

        .card { perspective: 1000px; width: 235px; height: 260px; cursor: pointer; }
        .card-inner { width: 100%; height: 100%; position: relative; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; overflow: hidden; }
        .card-front img { width: 100%; height: 100%; object-fit: cover; border: 2px solid #ffffff; box-sizing: border-box; }
        
        /* CARD BACK TEXT UPDATED */
        .card-back { 
            background: var(--primary); padding: 1px; 
            font-size: 16px; font-weight: 600; text-align: center;
            display: flex; align-items: center; justify-content: center; 
            transform: rotateY(180deg); line-height: 1.4;
        }

        #counter { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 8px 18px; border-radius: 20px; font-size: 12px; z-index: 20; border: 1px solid rgba(255,255,255,0.2); }
        input { padding: 12px; border-radius: 25px; border: none; text-align: center; background: rgba(255,255,255,0.9); color: #000; width: 75%; font-size: 14px; }
        #noBtn { position: absolute; }
        
        #anniTyping { text-align: left; white-space: pre-wrap; font-size: 18px; line-height: 1.5; font-style: italic; }
    </style>
</head>
<body>

<div class="master-bg"></div>
<div id="hearts-container"></div>
<canvas id="fireworks"></canvas>

<div id="zoomOverlay">
    <img id="zoomedImg" src="" alt="Zoomed Photo">
</div>

<div id="lockPage" class="page">
    <div class="glass">
        <h2>Enter Code 🔐</h2>
        <input type="password" id="passwordInput" placeholder="Try 16...">
        <br><br>
        <button class="btn" id="unlockBtn">Unlock Heart ❤️</button>
    </div>
</div>

<div id="galleryPage" class="page hidden">
    <h2 style="margin-bottom: 10px;">Our Memories 📸</h2>
    <p style="font-size: 10px; opacity: 0.8;">Double Tap to Zoom / Single Tap to Flip</p>
    <div class="gallery-container"><div class="gallery" id="gallery"></div></div>
    <button class="btn" id="proposalBtn">Next... 💍</button>
</div>

<div id="proposalPage" class="page hidden">
    <div class="glass">
        <h2>Stay Forever? ❤️</h2>
        <div style="height: 60px; position: relative; width: 100%;">
            <button class="btn" id="yesBtn">YES 💖</button>
            <button class="btn" id="noBtn">NO 😅</button>
        </div>
    </div>
</div>

<div id="finalPage" class="page hidden">
    <div class="glass">
        <h1>Forever Us ❤️</h1>
        <div id="typing" style="font-size: 15px; font-style: italic; min-height: 40px; margin-bottom: 10px;"></div>
        <button class="btn" id="anniversaryBtn">Happy Anniversary 🎉</button>
    </div>
</div>

<div id="anniversaryPage" class="page hidden">
    <div class="glass" id="anniScrollBox">
        <h2 style="text-align: center;">Happy Anniversary ❤️</h2>
        <div id="anniTyping"></div>
        <br>
        <button class="btn" id="restartBtn" style="display:none; width: 100%;" onclick="location.reload()">Back to Start ❤️</button>
    </div>
</div>

<div id="counter" class="hidden"></div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const pages = { lock: document.getElementById("lockPage"), gallery: document.getElementById("galleryPage"), proposal: document.getElementById("proposalPage"), final: document.getElementById("finalPage"), anniversary: document.getElementById("anniversaryPage") };
    const startDate = new Date("2025-03-06T00:00:00");

    // ZOOM LOGIC
    const zoomOverlay = document.getElementById("zoomOverlay");
    const zoomedImg = document.getElementById("zoomedImg");
    zoomOverlay.onclick = () => zoomOverlay.style.display = "none";

    function createHeart() {
        const heart = document.createElement('div'); heart.className = 'heart-fall'; heart.innerHTML = '❤️';
        heart.style.left = Math.random() * 100 + 'vw'; heart.style.animationDuration = Math.random() * 3 + 4 + 's';
        document.getElementById('hearts-container').appendChild(heart);
        setTimeout(() => heart.remove(), 7000);
    }
    setInterval(createHeart, 600);

    document.getElementById("unlockBtn").onclick = () => {
        if(document.getElementById("passwordInput").value === "16-04-2025") { showPage('gallery'); startCounter(); }
        else alert("Wrong Password! ❌");
    };

    document.getElementById("proposalBtn").onclick = () => showPage('proposal');
    document.getElementById("yesBtn").onclick = () => { showPage('final'); startTyping(); initFireworks(); checkAnniversaryStatus(); };

    function checkAnniversaryStatus() {
        let days = Math.floor((new Date() - startDate) / 86400000);
        if(days >= 365) document.getElementById("anniversaryBtn").style.display = "inline-block";
    }

    document.getElementById("anniversaryBtn").onclick = () => { showPage('anniversary'); startAnniversaryTyping(); };

    const noBtn = document.getElementById("noBtn");
    const move = () => { noBtn.style.left = Math.random()*70+"%"; noBtn.style.top = Math.random()*70+"%"; noBtn.style.position = "fixed"; };
    noBtn.onmouseover = move;

    function showPage(k) { Object.keys(pages).forEach(key => pages[key].classList.add("hidden")); pages[k].classList.remove("hidden"); }

    const imgs = ["mine1.jpg","mine2.jpg","mine3.jpg","mine4.jpg","mine5.jpg","mine6.jpg","mine7.jpg","mine8.jpg"];
    const caps=[
        "That first smile of yours… the moment my heart quietly chose you forever ❤️",
        "Whenever I look into your eyes, it feels like I found my entire world there ✨",
        "Our little moments together became the most beautiful days of my life 🌸",
        "Some bonds are written by destiny… and ours feels exactly like that 💍",
        "You are not just my happiness, you are the peace my heart searched for 💖",
        "Our crazy moments are the memories that make my life feel alive 😂",
        "Every memory with you becomes a story my heart wants to relive forever 🥰",
        "No matter where life takes us… my heart will always find its way back to you ❤️"
    ];

    const gallery = document.getElementById("gallery");
    imgs.forEach((img, i) => {
        const card = document.createElement('div'); card.className = 'card';
        card.innerHTML = `<div class="card-inner"><div class="card-front"><img src="${img}" onerror="this.src='https://via.placeholder.com/150/ff4d6d/fff?text=❤️'"></div><div class="card-back">${caps[i]}</div></div>`;
        
        // DOUBLE CLICK TO ZOOM / SINGLE CLICK TO FLIP
        let lastTap = 0;
        card.addEventListener('click', function(e) {
            const now = Date.now();
            if (now - lastTap < 300) { // Double Tap Detected
                zoomedImg.src = img;
                zoomOverlay.style.display = "flex";
            } else { // Single Tap Detected
                card.classList.toggle('flipped');
            }
            lastTap = now;
        });
        
        gallery.appendChild(card);
    });

    function startCounter() {
        document.getElementById("counter").classList.remove("hidden");
        setInterval(() => {
            let d = new Date() - startDate;
            document.getElementById("counter").innerHTML = Math.floor(d/86400000)+"D "+Math.floor(d/3600000)%24+"H "+Math.floor(d/60000)%60+"M "+Math.floor(d/1000)%60+"S ❤️";
        }, 1000);
    }

    function startTyping() {
        const txt = "You are my today and all of my tomorrows. Every heartbeat is for you. I love you forever! ❤️"; 
        let i = 0; const target = document.getElementById("typing"); target.innerHTML = "";
        function type() { if(i < txt.length) { target.innerHTML += txt[i++]; setTimeout(type, 50); } }
        type();
    }

    function startAnniversaryTyping() {
        const anniTxt = `Khushi…
Agar tum yeh message padh rahi ho,
toh iska matlab hai ki
hamare 365 days complete ho gaye.
Ek poora saal…
aur honestly, yeh line likhte waqt bhi
mujhe thoda emotional feel ho raha hai.

Pichle 365 din mein
shayad hum perfect couple nahi the.
Kabhi random fights hui,
kabhi ego, kabhi silence…
par phir bhi har baar
kisi na kisi tareeke se
hum wapas ek dusre tak pahunch gaye.
Aur shayad wahi hamari story ko special banata hai.

Khushi,
tum meri life mein koi normal person nahi ho.
Tum woh insaan ho
jiske saath main apna sabse real version ho sakta hoon.
Kabhi stupid,
kabhi overthinking wala,
kabhi emotional…
aur kabhi bas chup.
Aur phir bhi
tum mere saath rehti ho.

Sach bolun toh
iss ek saal mein
tum meri habit ban gayi ho.
Din ke end mein
tumhare baare mein sochna automatic ho gaya hai.

Kabhi kabhi main imagine karta hoon
agar tum meri life mein nahi aati…
toh shayad meri life thodi kam colourful hoti.

Tumne meri life mein sirf pyaar nahi add kiya Khushi,
tumne usme meaning add kiya hai.
Aur agar tum yeh message ab padh rahi ho…
toh bas ek baat aur bolna chahta hoon.

Thank you.
Thank you mere saath rehne ke liye,
mere mood swings tolerate karne ke liye,
mere stupid jokes pe hasne ke liye,
aur kabhi kabhi mujhe samajhne ke liye
jab main khud ko bhi nahi samajh pata.

365 days ho gaye Khushi…
par dil se lagta hai
yeh bas hamari story ka first chapter tha.

Aur main genuinely chahta hoon
ki aage ke chapters bhi
tumhare saath hi likhun.

Kyuki tum sirf meri girlfriend nahi ho.
Tum meri Khushi ho.
Meri peace ho.
Aur meri life ka woh part ho
jisko main kabhi lose nahi karna chahta.

Happy 365 days of us ❤️

—
Always yours,
Mukku`;

        let j = 0;
        const target = document.getElementById("anniTyping");
        const scrollBox = document.getElementById("anniScrollBox");
        target.innerHTML = "";
        
        function typeAnni() {
            if(j < anniTxt.length) {
                target.innerHTML += anniTxt[j++];
                scrollBox.scrollTop = scrollBox.scrollHeight;
                setTimeout(typeAnni, 65);
            } else {
                document.getElementById("restartBtn").style.display = "block";
            }
        }
        typeAnni();
    }

    const canvas = document.getElementById("fireworks"); const ctx = canvas.getContext("2d");
    let particles = [];
    function initFireworks() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; loop(); }
    function loop() {
        ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        if(Math.random() < 0.05) { particles.push({x: Math.random()*canvas.width, y: canvas.height, vx: (Math.random()-0.5)*2, vy: -Math.random()*5-15, life: 100, color: `hsl(${Math.random()*360},100%,70%)`, rocket: true}); }
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy;
            if(p.rocket) { p.vy += 0.2; ctx.fillStyle = "#fff"; ctx.fillRect(p.x, p.y, 2, 2); if(p.vy >= -1) { for(let j=0; j<50; j++) { const ang = Math.random()*Math.PI*2; const s = Math.random()*6; particles.push({x: p.x, y: p.y, vx: Math.cos(ang)*s, vy: Math.sin(ang)*s, life: 60, color: p.color, rocket: false}); } particles.splice(i, 1); } }
            else { p.vy += 0.1; p.life--; ctx.fillStyle = p.color; ctx.globalAlpha = p.life/60; ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, 7); ctx.fill(); if(p.life <= 0) particles.splice(i, 1); }
        });
        requestAnimationFrame(loop);
    }
});
</script>
</body>
      </html>
